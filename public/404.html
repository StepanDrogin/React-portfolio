<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#012624" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Страница не найдена — Степан Дрогин</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
        background: #012624;
        color: #f0fffe;
      }

      main {
        width: min(100%, 760px);
        padding: clamp(32px, 8vw, 80px);
        border: 1px solid rgba(203, 255, 252, 0.18);
        border-radius: 24px;
        background: rgba(0, 55, 52, 0.72);
      }

      p {
        color: #a9c5c3;
        line-height: 1.6;
      }

      .code {
        color: #cbfffc;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 20px 0;
        font-size: clamp(42px, 9vw, 86px);
        line-height: 0.95;
        letter-spacing: -0.055em;
      }

      a {
        display: inline-flex;
        margin-top: 24px;
        padding: 14px 20px;
        border: 1px solid rgba(203, 255, 252, 0.28);
        border-radius: 12px;
        color: #cbfffc;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="ui-span code">Ошибка 404</span>
      <h1 class="ui-title">Страница не найдена</h1>
      <p>
        Такой страницы нет. Вернитесь на главную, чтобы посмотреть опыт, кейсы
        и способы связи.
      </p>
      <a href="/">Вернуться на главную →</a>
    </main>
  </body>
</html>
